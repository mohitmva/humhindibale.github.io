<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ग़ज़लकार - हम हिंदी वाले</title>
    <link href="https://fonts.googleapis.com/css2?family=Tiro+Devanagari+Hindi&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #800000; --bg: #fdfaf1; }
        body { font-family: 'Tiro Devanagari Hindi', serif; background-color: var(--bg); margin: 0; padding: 0; color: #2c2c2c; }
        
        header { background: var(--accent); color: white; padding: 40px 20px; text-align: center; border-bottom: 5px solid #5a0000; }
        header h1 { margin: 0; font-size: 2.5rem; }

        .poet-list { max-width: 900px; margin: 40px auto; padding: 0 20px; }
        .poet-card { 
            background: white; margin-bottom: 15px; padding: 20px; 
            border-left: 5px solid #ccc; display: flex; align-items: center; 
            text-decoration: none; color: inherit; transition: 0.3s; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.05); border-radius: 5px;
        }
        .poet-card:hover { 
            transform: translateX(10px); background: #fffcf5; 
            border-left: 5px solid var(--accent); 
        }
        
        .poet-card img { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; margin-right: 20px; border: 2px solid #eee; }
        .poet-info .name { font-weight: bold; font-size: 1.4rem; color: var(--accent); }
        .poet-info .qual { font-size: 0.9rem; color: #666; font-style: italic; }

        .btn-home { display: block; text-align: center; margin: 40px auto; width: 180px; padding: 10px 20px; background: var(--accent); color: white; text-decoration: none; border-radius: 5px; }
    </style>
</head>
<body>

<header>
    <h1>ग़ज़लकार</h1>
    <p>एहसासों को शब्दों में पिरोने वाले कलमकार</p>
</header>

<div class="poet-list">
    <a href="ghazal/mohit-kumar-vinita.html" class="poet-card">
        <img src="mohit.jpg" alt="मोहित कुमार विनीता">
        <div class="poet-info">
            <div class="name">मोहित कुमार 'विनीता'</div>
            <div class="qual">UGC NET, MA Hindi</div>
        </div>
        <span style="margin-left:auto; color: #aaa;">👉</span>
    </a>

    </div>

<a href="index.html" class="btn-home">वापस होम पर जाएँ</a>

</body>
</html>

<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>कहानी खंड | हम हिंदी वाले</title>
    <link href="https://fonts.googleapis.com/css2?family=Tiro+Devanagari+Hindi&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tiro Devanagari Hindi', serif; background: #fdfaf1; margin: 0; }
        .header-bar { background: #800000; color: white; padding: 20px; text-align: center; }
        .search-area { text-align: center; padding: 30px; }
        #search { width: 80%; max-width: 600px; padding: 15px; border-radius: 25px; border: 1px solid #ccc; font-size: 1.1rem; outline: none; }
        .list-container { max-width: 800px; margin: auto; padding: 20px; }
        .story-link { 
            display: block; background: white; padding: 15px; margin-bottom: 10px;
            text-decoration: none; color: #800000; border-left: 5px solid #800000;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05); font-size: 1.2rem;
        }
        .story-link span { float: right; color: #666; font-size: 0.9rem; font-style: italic; }
    </style>
</head>
<body>
    <div class="header-bar"><h1>कहानी खंड</h1></div>
    <div class="search-area">
        <input type="text" id="search" onkeyup="searchFn()" placeholder="कहानी या लेखक खोजें...">
    </div>
    <div class="list-container" id="list">
        <a href="stories/kathan.html" class="story-link" data-name="कफन" data-author="प्रेमचंद">
            कफन <span>प्रेमचंद</span>
        </a>
    </div>

    <script>
        function searchFn() {
            let input = document.getElementById('search').value.toUpperCase();
            let links = document.getElementsByClassName('story-link');
            for (let i = 0; i < links.length; i++) {
                let text = links[i].getAttribute('data-name') + links[i].getAttribute('data-author');
                links[i].style.display = text.toUpperCase().includes(input) ? "" : "none";
            }
        }
    </script>
</body>
</html>
